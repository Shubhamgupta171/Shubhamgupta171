name: Latest Tech & Backend Headlines

on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          max_post_count: 8
          comment_tag_name: "BLOG-POST-LIST"
          template: "- 🔹 [**$title**]($url)"
          commit_message: "chore: refresh latest tech headlines"
          committer_username: "Shubham Gupta"
          committer_email: "inboxshubhamgupta17@gmail.com"
          retry_count: 3
          retry_wait_time: 2
          feed_list: >-
            https://dev.to/feed/tag/backend,
            https://dev.to/feed/tag/systemdesign,
            https://dev.to/feed/tag/webdev,
            https://dev.to/feed/tag/devops,
            https://dev.to/feed/tag/node,
            https://dev.to/feed/tag/microservices,
            https://dev.to/feed/tag/architecture,
            https://dev.to/feed/tag/api,
            http://feeds.feedburner.com/HighScalability,
            https://martinfowler.com/feed.atom,
            https://aws.amazon.com/blogs/aws/feed/,
            https://engineering.atspotify.com/feed/,
            https://netflixtechblog.com/feed
